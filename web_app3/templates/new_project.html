<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Project</title>
    <script>
        let liveDistances = {}; // Holds live distances from ESP32
        let savedDistances = {}; // Holds saved distances

        // Fetch live distances from the server
        function fetchLiveDistances() {
            fetch('/live_distances')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error("Error fetching live distances:", data.details);
                        return;
                    }
                    liveDistances = data;
                    updateLiveFields(); // Update the fields with live data
                    displayLiveDistances(); // Display live distances on the page
                })
                .catch(error => {
                    console.error("Error fetching live distances:", error);
                });
        }

        // Update live fields with fetched data
        function updateLiveFields() {
            const inputs = document.querySelectorAll(".live-distance");
            inputs.forEach(input => {
                const anchor = input.dataset.anchor;
                if (!savedDistances[anchor] && liveDistances[anchor]) {
                    input.value = liveDistances[anchor];
                }
            });
        }

        // Display live distances on the page for debugging
        function displayLiveDistances() {
            const liveDistancesContainer = document.getElementById("live-distances-container");
            liveDistancesContainer.innerHTML = `
                <h3>Live Distances</h3>
                <p>A1 Range: ${liveDistances["A1 Range"] || "Not available"}</p>
                <p>A2 Range: ${liveDistances["A2 Range"] || "Not available"}</p>
            `;
        }

        // Sync A1 and A2 distances together
        function syncA1A2() {
            const a1Input = document.querySelector("#distance_a1");
            const a2Input = document.querySelector("#distance_a2");

            if (liveDistances["A1 Range"] && liveDistances["A2 Range"]) {
                savedDistances["A1"] = liveDistances["A1 Range"];
                savedDistances["A2"] = liveDistances["A2 Range"];

                a1Input.value = liveDistances["A1 Range"];
                a2Input.value = liveDistances["A2 Range"];

                a1Input.setAttribute("readonly", true);
                a2Input.setAttribute("readonly", true);

                const syncButton = document.querySelector("#sync_button_0");
                syncButton.textContent = "Synced";
                syncButton.setAttribute("disabled", true);

                console.log(`Synced A1 and A2 distances: ${savedDistances["A1"]}, ${savedDistances["A2"]}`);

                // Add hidden inputs for A1 and A2 distances
                addHiddenInput("distance_a1", liveDistances["A1 Range"]);
                addHiddenInput("distance_a2", liveDistances["A2 Range"]);
            } else {
                console.error("Live distance data for A1 and A2 not available.");
            }
        }

        // Sync additional anchor distances (e.g., A3, A4, etc.)
        function syncAnchor(anchorIndex) {
            const a1Input = document.querySelector(`#distance_a${anchorIndex}_a1`);
            const a2Input = document.querySelector(`#distance_a${anchorIndex}_a2`);

            if (liveDistances["A1 Range"] && liveDistances["A2 Range"]) {
                savedDistances[`A${anchorIndex}_A1`] = liveDistances["A1 Range"];
                savedDistances[`A${anchorIndex}_A2`] = liveDistances["A2 Range"];

                a1Input.value = liveDistances["A1 Range"];
                a2Input.value = liveDistances["A2 Range"];

                a1Input.setAttribute("readonly", true);
                a2Input.setAttribute("readonly", true);

                const syncButton = document.querySelector(`#sync_button_a${anchorIndex}`);
                syncButton.textContent = "Synced";
                syncButton.setAttribute("disabled", true);

                console.log(`Synced A${anchorIndex} distance from A1 with: ${savedDistances[`A${anchorIndex}_A1`]} and A${anchorIndex} distance from A2 with: ${savedDistances[`A${anchorIndex}_A2`]}`);

                // Add hidden inputs for A3, A4, etc. distances
                addHiddenInput(`distance_a${anchorIndex}_a1`, liveDistances["A1 Range"]);
                addHiddenInput(`distance_a${anchorIndex}_a2`, liveDistances["A2 Range"]);
            } else {
                console.error(`Live distance data for A${anchorIndex} not available.`);
            }
        }

        // Add hidden inputs for saved distances
        function addHiddenInput(name, value) {
            const form = document.querySelector("form");
            const input = document.createElement("input");
            input.type = "hidden";
            input.name = name;
            input.value = value;
            form.appendChild(input);
        }

        // Add input fields for additional anchors
        function addAnchorInput() {
            const container = document.getElementById("anchor-input-container");
            const anchorIndex = container.children.length + 3; // Start from A3
            const inputGroup = document.createElement("div");
            inputGroup.classList.add("anchor-input-group");
            inputGroup.innerHTML = `
                <label>A${anchorIndex} distance from A1: </label>
                <input type="number" id="distance_a${anchorIndex}_a1" class="live-distance" data-anchor="A${anchorIndex}_A1" required>
                <label>A${anchorIndex} distance from A2: </label>
                <input type="number" id="distance_a${anchorIndex}_a2" class="live-distance" data-anchor="A${anchorIndex}_A2" required>
                <button type="button" id="sync_button_a${anchorIndex}" onclick="syncAnchor(${anchorIndex})">Sync</button>
                <button type="button" onclick="removeAnchorInput(this)">Remove</button>
            `;
            container.appendChild(inputGroup);

            const a1Input = document.querySelector(`#distance_a${anchorIndex}_a1`);
            const a2Input = document.querySelector(`#distance_a${anchorIndex}_a2`);

            if (liveDistances["A1 Range"]) {
                a1Input.value = liveDistances["A1 Range"];
            }
            if (liveDistances["A2 Range"]) {
                a2Input.value = liveDistances["A2 Range"];
            }
        }

        // Remove an anchor input group
        function removeAnchorInput(button) {
            button.parentElement.remove();
        }

        // Call the function to fetch the ranges live when the page loads
        window.onload = function () {
            setInterval(fetchLiveDistances, 2000); // Fetch live distances every 2 seconds
        };
    </script>
</head>
<body>
    <h1>Create a New Project</h1>
    <form action="/new_project" method="POST">
        <label for="project_id">Project ID:</label>
        <input type="text" name="project_id" required>
        <br>

        <h2>Anchor A1 and A2 Setup</h2>
        <label>A1 Distance from (0,0): </label>
        <input type="number" id="distance_a1" name="distance_a1" class="live-distance" data-anchor="A1" required><br>
        <label>A2 Distance from (0,0): </label>
        <input type="number" id="distance_a2" name="distance_a2" class="live-distance" data-anchor="A2" required><br>

        <!-- Single Sync Button for A1 and A2 -->
        <button type="button" id="sync_button_0" onclick="syncA1A2()">Sync (0,0)</button>

        <h2>Additional Anchors</h2>
        <button type="button" onclick="addAnchorInput()">Add Anchor</button>
        <div id="anchor-input-container"></div>

        <br><br>
        <input type="submit" value="Save Project">
    </form>

    <!-- Display live distances here -->
    <div id="live-distances-container"></div>
</body>
</html>
