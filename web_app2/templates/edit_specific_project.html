<!DOCTYPE html>
<html>
<head>
    <title>Edit {{ project_id }}</title>
</head>
<body>
    <h1>Edit Project: {{ project_id }}</h1>
    <form method="POST">
        <table>
            <tr>
                <th>Anchor ID</th>
                <th>x</th>
                <th>y</th>
                <th>Range</th>
            </tr>
            {% for anchor in anchors %}
            <tr>
                <td><input type="text" name="A" value="{{ anchor['A'] }}" readonly></td>
                <td><input type="number" name="x" step="0.0001" value="{{ anchor['x'] }}" required></td>
                <td><input type="number" name="y" step="0.0001" value="{{ anchor['y'] }}" required></td>
                <td><input type="number" name="range" step="0.0001" value="{{ anchor['range'] }}" required></td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <button type="submit">Save Changes</button>
    </form>
    <a href="/edit_project">Back to Project List</a>
</body>
</html>
